version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: telegram-bot-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: telegram_bot_host
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d telegram_bot_host"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: telegram-bot-host
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/telegram_bot_host
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:-change-this-to-a-very-long-secret-key}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-https://your-domain.com}
      WEBHOOK_PATH: /webhook
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: info
      POLLING_CONCURRENT_BOTS: 10
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: